version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fg-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-finance_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - finance-network

  redis:
    image: redis:7-alpine
    container_name: fg-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - finance-network

  backend:
    build:
      context: ./backend
      target: development
    container_name: fg-backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@db:5432/${POSTGRES_DB:-finance_db}?schema=public
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY:-""}
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - db
      - redis
    networks:
      - finance-network

  etl:
    build:
      context: ./etl
    container_name: fg-etl-worker
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@db:5432/${POSTGRES_DB:-finance_db}?schema=public
      - CELERY_BROKER_URL=redis://redis:6379/0
      - BRAPI_TOKEN=${BRAPI_TOKEN:-""}
    volumes:
      - ./etl:/usr/src/app
    depends_on:
      - db
      - redis
    networks:
      - finance-network

  frontend:
    build:
      context: ./frontend
      target: development
    container_name: fg-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/.next
    depends_on:
      - backend
    networks:
      - finance-network

volumes:
  postgres_data:

networks:
  finance-network:
    driver: bridge
